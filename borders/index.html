<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Borders</title>
    <link rel="stylesheet" href="scss/border-custom.css" />
    <link rel="stylesheet" href="../../common/scss/common.css" />
    <link
      rel="stylesheet"
      href="../node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container">
      <header class="mt-3">
        <div class="center-element">
          <img
            src="../../img/transparentLogo.png"
            alt="Hoidle logo"
            id="hoidle-logo"
            class="mx-auto rounded p-2"
          />
        </div>
        <div class="top-right">
          <button id="profile-button" class="rounded p-2">Profile</button>
        </div>
      </header>
      <article class="text-center flex-column align-items-center mx-auto">
        <div
          id="border-container"
          class="border border-light-subtle rounded bg-dark text-light p-4"
        >
          <h1>Guess the border!</h1>
          <img
            src="borders-img/Afganistan.png"
            id="daily-border-img"
            alt="Opera user"
          />
        </div>
        <form action="#" id="guess-form" class="d-flex mx-auto m-3 ">
          <div class="guess-input-group d-flex gap-2">
            <input type="text" id="guess-input" class="form-control" placeholder="Enter your guess" />
            <button type="submit" id="guess-button" class="btn btn-primary">Submit</button>
        </div>
        </form>
        <div id="guess-container" class="mt-3">
          <ul id="guess-list" class="list-group">
          </ul>
      </article>
    </div>
    <script src="../node_modules/jquery/dist/jquery.min.js"></script>
    <script type="module" src="../common/js/guess-form.js"></script>
  </body>
</html>
