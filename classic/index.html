<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classic</title>

    <link
      rel="stylesheet"
      href="../node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="scss/classic-custom.css" />
    <link rel="stylesheet" href="../../common/scss/common.css" />
  </head>
  <body>
    <div class="container">
      <header class="mt-3">
        <div class="center-element">
          <a href="..">
            <img
              src="../img/transparentLogo.png"
              alt="Hoidle logo"
              id="hoidle-logo"
              class="mx-auto rounded p-2"
            />
          </a>
        </div>
        <div class="top-right">
          <button id="profile-button" class="rounded p-2">Profile</button>
        </div>
      </header>
      <article
        class="text-center d-flex flex-column align-items-center mx-auto"
      >
        <form
          action="#"
          id="guess-form"
          class="d-flex mx-auto m-3"
          autocomplete="off"
        >
          <div class="guess-input-group d-flex gap-2">
            <input
              type="text"
              id="guess-input"
              class="form-control"
              placeholder="Enter your guess"
            />
            <button type="submit" id="guess-button" class="btn btn-primary">
              Submit
            </button>
          </div>
        </form>
        <div id="guess-container"></div>
      </article>
    </div>
    <script src="../node_modules/jquery/dist/jquery.min.js"></script>
    <script type="module" src="./js/submit-classic-guess.js"></script>
  </body>
</html>
