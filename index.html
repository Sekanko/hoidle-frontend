<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hoidle</title>
    <link rel="stylesheet" href="scss/custom.css" />
    <link
      rel="stylesheet"
      href="node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container">
      <header class="mt-3">
        <div class="center-element">
          <img
            src="img/transparentLogo.png"
            alt="Hoidle logo"
            id="hoidle-logo"
            class="mx-auto rounded p-2"
          />
        </div>

        <div class="top-right">
          <a href="#" id="sign-in-button" class="rounded p-2">Sign In </a>
        </div>
      </header>

      <article class="text-center flex-column align-items-center">
        <ul class="nav justify-content-center mt-5">
          <li class="nav-item">
            <a class="nav-link active fs-10" href="#">
              <img src="img/classic.png" alt="classic" class="mode-img" />
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link fs-10" href="#">
              <img src="img/borders.png" alt="border" class="mode-img" />
            </a>
          </li>
        </ul>
      </article>
    </div>
  </body>
</html>
